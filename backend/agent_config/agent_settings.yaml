# LLM agent configuration for WhatsForTea
# Edit this file to tune model behaviour without touching Python code.
# The API server reads this file at startup (and on each LLM call).

# ── Models ────────────────────────────────────────────────────────────────────
# vision_model_id: used for tasks that require image understanding
#   (recipe card scanning, receipt photo scanning)
# text_model_id: used for text-only tasks
#   (ingredient normaliser, voice commands, nutrition estimation, TeaBot chat,
#    URL recipe import, receipt text extraction)
# Keeping Sonnet for vision ensures accurate card extraction.
# Haiku for text tasks cuts cost ~20x with no meaningful quality loss.
vision_model_id: us.anthropic.claude-sonnet-4-6
text_model_id: us.anthropic.claude-haiku-4-5-20251001-v1:0
temperature: 0.1
max_tokens: 4096

# ── Rate limiting ─────────────────────────────────────────────────────────────
# Maximum LLM calls allowed per hour across all users (ingestion pipeline).
# Returns HTTP 429 with Retry-After header when exceeded.
llm_rate_limit_per_hour: 20

# Maximum TeaBot chat requests per user per minute.
# Prevents a single user from flooding the LLM with rapid-fire messages.
chat_rate_limit_per_minute: 20

# ── Retry policy ──────────────────────────────────────────────────────────────
retry_attempts: 2
retry_delay_seconds: 5

# ── Normaliser settings ───────────────────────────────────────────────────────
# Fuzzy match score below which the LLM assist is triggered (0.0–1.0)
fuzzy_threshold_auto_accept: 0.85
fuzzy_threshold_llm_assist: 0.60

# ── "Use it up" mode ──────────────────────────────────────────────────────────
# Pantry items with confidence below this threshold are considered "at risk"
use_it_up_confidence_threshold: 0.5
