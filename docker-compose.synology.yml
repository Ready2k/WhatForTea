# Production compose file for Synology NAS (192.168.4.2)
#
# Usage:
#   docker-compose -f docker-compose.synology.yml pull
#   docker-compose -f docker-compose.synology.yml up -d
#
# Prerequisites:
#   1. Copy .env.example → .env and populate all values
#   2. Push images: ./scripts/push-images.sh --prod
#   3. SSH into NAS: pull images, then run docker-compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsfortea}
      POSTGRES_USER: ${POSTGRES_USER:-whatsfortea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /volume1/docker/whatsfortea/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatsfortea}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - whatsfortea-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - /volume1/docker/whatsfortea/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - whatsfortea-network
    restart: unless-stopped

  api:
    image: ready2k/whatsfortea-api:latest
    container_name: whatsfortea-api
    volumes:
      - /volume1/docker/whatsfortea/recipes:/data/recipes
    # No host port binding — accessed internally by the frontend proxy and caddy-proxy network
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whatsfortea}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-whatsfortea}
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - whatsfortea-network
    restart: unless-stopped

  worker:
    image: ready2k/whatsfortea-api:latest
    command: ["poetry", "run", "arq", "app.worker.WorkerSettings"]
    volumes:
      - /volume1/docker/whatsfortea/recipes:/data/recipes
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-whatsfortea}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-whatsfortea}
      REDIS_URL: redis://redis:6379
      AWS_ENDPOINT_URL: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - whatsfortea-network
    restart: unless-stopped

  frontend:
    image: ready2k/whatsfortea-frontend:latest
    container_name: whatsfortea-frontend
    # No host port binding — caddy-proxy reaches this via whatsfortea-network
    environment:
      # Internal Docker network URL — frontend proxies /api/* to this
      API_URL: http://api:8000
    depends_on:
      - api
    networks:
      - whatsfortea-network
    restart: unless-stopped

networks:
  whatsfortea-network:
    name: whatsfortea-network
    driver: bridge
