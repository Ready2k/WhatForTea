name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: whatsfortea_test
          POSTGRES_USER: whatsfortea
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: |
          cd backend
          poetry install

      - name: Lint with Ruff
        run: |
          cd backend
          poetry run ruff check .

      - name: Security check with Bandit
        run: |
          cd backend
          poetry run bandit -ll -r app

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://whatsfortea:password@localhost:5432/whatsfortea_test
          PYTHONPATH: .
        run: |
          cd backend
          poetry run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://whatsfortea:password@localhost:5432/whatsfortea_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret
          AWS_ACCESS_KEY_ID: mock
          AWS_SECRET_ACCESS_KEY: mock
          AWS_REGION: us-east-1
          BEDROCK_MODEL_ID: mock
          BEDROCK_TEXT_MODEL_ID: mock
          PYTHONPATH: .
        run: |
          cd backend
          poetry run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          API_URL: http://localhost:8000
